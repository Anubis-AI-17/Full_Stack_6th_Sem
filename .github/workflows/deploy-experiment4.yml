name: Deploy Experiment 4 to GitHub Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies for Experiment-4
        run: |
          cd Experiment-4-Context-API
          npm ci
      - name: Build Experiment-4
        run: |
          cd Experiment-4-Context-API
          npm run build
      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: Experiment-4-Context-API/dist
          clean: true
          token: ${{ secrets.GITHUB_TOKEN }}
